<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    .hero { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 80px 20px; text-align: center; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 12px; }
    .hero p { font-size: 1.2rem; opacity: 0.9; }
    .form-section { max-width: 480px; margin: -40px auto 40px; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .form-section h2 { margin-bottom: 20px; text-align: center; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { resize: vertical; min-height: 80px; }
    button { width: 100%; padding: 14px; background: #667eea; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #5a6fd6; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; text-align: center; display: none; }
    .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; text-align: center; display: none; }
    .admin-link { text-align: center; margin: 20px; }
    .admin-link a { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Ваш продукт</h1>
    <p>Краткое описание вашего предложения</p>
  </div>

  <div class="form-section">
    <h2>Оставить заявку</h2>
    <div class="success" id="success">Заявка отправлена!</div>
    <div class="error" id="error"></div>
    <form id="leadForm">
      <input type="text" name="name" placeholder="Ваше имя" required>
      <input type="tel" name="phone" placeholder="Телефон" required>
      <textarea name="message" placeholder="Сообщение (необязательно)"></textarea>
      <button type="submit">Отправить</button>
    </form>
  </div>

  <div class="admin-link"><a href="/admin.html">Админ-панель</a></div>

  <script>
    const form = document.getElementById('leadForm');
    const success = document.getElementById('success');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true;
      success.style.display = 'none';
      error.style.display = 'none';

      const data = Object.fromEntries(new FormData(form));
      if (!data.message) delete data.message;

      try {
        const res = await fetch('/leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error((await res.json()).error);
        success.style.display = 'block';
        form.reset();
      } catch (err) {
        error.textContent = err.message || 'Ошибка отправки';
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
